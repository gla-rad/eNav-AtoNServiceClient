# Service properties
server.port=8768
spring.application.name=aton-service-client
spring.cloud.config.enabled=false
spring.application.version=test

# Disable Security while testing
app.security.basic.enabled=false
keycloak.enabled=false
secom.security.ssl.insecure-ssl-policy=true

# Spring JPA Configuration - MySQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create

# Use an on-memory database while testing
spring.datasource.url=jdbc:h2:./target/testdb;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# Disable Eureka when testing
eureka.client.enabled = false

spring.main.allow-bean-definition-overriding=true

# Front-end Information
gla.rad.aton-service-client.info.name=AtoN Service Client
gla.rad.aton-service-client.info.version=${spring.application.version}
gla.rad.aton-service-client.info.operatorName=Research and Development Directorate of GLA of UK and Ireland
